<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The White Ducks | Official Store</title>

<style>
:root {
    --bg-blue: #1a3a8a;
    --card-white: #ffffff;
    --text-white: #ffffff;
    --primary-blue: #0f2a6b;
}

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background-color: var(--bg-blue);
    color: var(--text-white);
    margin: 0;
    padding-top: 70px;
    text-align: center;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 15px 0;
    z-index: 1000;
}

nav a {
    text-decoration: none;
    color: var(--text-white);
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover { color: #82b1ff; }

/* HERO */
.hero-section {
    padding: 40px 20px;
    background: rgba(0, 0, 0, 0.15);
}

.main-logo {
    max-width: 280px;
    width: 90%;
    height: auto;
    margin-bottom: 10px;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
}

header h1 { font-size: 3.5rem; margin: 10px 0 0; }
header p { font-size: 1.3rem; opacity: 0.9; }

/* PRODUCTS */
.section-title {
    margin: 60px 0 30px;
    font-size: 2.2rem;
}

.products-wrapper {
    display: flex;
    overflow-x: auto;
    padding: 20px;
    gap: 25px;
    scrollbar-width: none;
}

.products-wrapper::-webkit-scrollbar { display: none; }

.product-card {
    position: relative;
    min-width: 280px;
    background: var(--card-white);
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    flex-shrink: 0;
    color: var(--bg-blue);
    transition: 0.3s;
}

.product-card:hover { transform: translateY(-10px); }

.product-card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border-radius: 20px;
}

/* COMING SOON RIBBON */
.coming-soon {
    position: absolute;
    top: 20px;
    right: -45px;
    background: var(--primary-blue);
    color: white;
    padding: 8px 60px;
    font-weight: bold;
    transform: rotate(45deg);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* BUTTON */
.order-btn {
    background-color: var(--bg-blue);
    color: white;
    padding: 12px 30px;
    border-radius: 50px;
    text-decoration: none;
    display: inline-block;
    margin-top: 15px;
    font-weight: bold;
    transition: 0.3s;
}

.order-btn:hover { background-color: #000; transform: scale(1.05); }

.disabled-btn {
    background-color: grey;
    pointer-events: none;
    opacity: 0.6;
}

/* FOOTER */
footer {
    padding: 60px 20px;
    background: rgba(0, 0, 0, 0.2);
    margin-top: 80px;
}
</style>
</head>

<body>

<nav>
    <a href="#store">החנות</a>
    <a href="https://forms.gle/qkWGvWto1B4vRh5x6" target="_blank">הזמנה</a>
</nav>

<section class="hero-section">
    <img src="logo.png" alt="לוגו" class="main-logo">
    <header>
        <h1>THE WHITE DUCKS</h1>
        <p>הברווזים הלבנים מאז 2017</p>
    </header>
</section>

<main id="store">
<h2 class="section-title">מרצ'נדייז רשמי</h2>

<div class="products-wrapper">

    <!-- חולצה -->
    <div class="product-card">
        <img src="shirt1.jpg" alt="חולצה">
        <h3>חולצת אולטראס</h3>
        <p>40 ₪</p>
        <a href="https://forms.gle/qkWGvWto1B4vRh5x6" target="_blank" class="order-btn">הזמן עכשיו</a>
    </div>

    <!-- כובע - בקרוב -->
    <div class="product-card">
        <div class="coming-soon">בקרוב</div>
        <img src="hat.jpg" alt="כובע">
        <h3>כובע</h3>
        <p>40 ₪</p>
        <a class="order-btn disabled-btn">לא זמין</a>
    </div>

    <!-- צעיף - בקרוב -->
    <div class="product-card">
        <div class="coming-soon">בקרוב</div>
        <img src="scarf.jpg" alt="צעיף">
        <h3>צעיף</h3>
        <p>40 ₪</p>
        <a class="order-btn disabled-btn">לא זמין</a>
    </div>

    <!-- סטיקרים -->
    <div class="product-card">
        <img src="stickers.jpg" alt="סטיקרים">
        <h3>חבילת סטיקרים</h3>
        <p>10 ₪</p>
        <a href="https://forms.gle/qkWGvWto1B4vRh5x6" target="_blank" class="order-btn">הזמן עכשיו</a>
    </div>

</div>
</main>

<footer>
    <p>© כל הזכויות שמורות לברווזים הלבנים</p>
</footer>

</body>
</html>
